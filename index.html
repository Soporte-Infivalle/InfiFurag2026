<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURAG 2025 — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
  <script src="config.js"></script>
</head>
<body>

  <header class="app-header">
    <a href="index.html" class="header-logo">FURAG <em>2025</em></a>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="header-badge">Formulario de Respuestas</span>
      <a href="admin.html" class="header-admin-btn" title="Panel Admin">⚙</a>
    </div>
  </header>

  <div id="s-loading" class="center-screen">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:.9rem">Cargando módulos…</p>
  </div>

  <div id="s-main" class="page" style="display:none">
    <h1 class="page-title">Selecciona tu módulo</h1>
    <p class="page-sub">
      Elige el módulo que te corresponde. Las preguntas se muestran en el orden oficial del formulario FURAG.
    </p>

    <div class="id-row">
      <div>
        <label class="field-label" for="inp-nombre">Tu nombre completo</label>
        <input id="inp-nombre" class="input-field" type="text"
               placeholder="Ej: María García" autocomplete="name">
      </div>
      <div>
        <label class="field-label" for="inp-entidad">Area / Proceso</label>
        <input id="inp-entidad" class="input-field" type="text"
               placeholder="Ej: Planeación" autocomplete="organization">
      </div>
    </div>

    <div class="section-label">Módulos — en orden FURAG</div>
    <div class="mod-grid" id="mod-grid"></div>
  </div>

  <div id="s-error" style="display:none" class="center-screen">
    <div class="err-icon">⚠️</div>
    <div class="err-title">No se pudo cargar</div>
    <p class="err-msg">Verifica que <code>data/index.json</code> existe en el repositorio.</p>
    <div class="err-code" id="err-detail"></div>
    <button class="btn btn-outline" onclick="location.reload()">Reintentar</button>
  </div>

  <div class="toast" id="toast" role="alert"></div>

  <script src="js/shared.js"></script>
  <script>
    const MODULE_NAMES = {
      CCP:'COMPRAS Y CONTRATACIÓN',
      CIN:'CONTROL INTERNO',
      DJU:'DEFENSA JURÍDICA',
      EMI:'TEMAS TRANSVERSALES',
      FIN:'FINALES',
      FOR:'FORTALECIMIENTO INSTITUCIONAL',
      GCI:'GESTIÓN DEL CONOCIMIENTO Y LA INNOVACIÓN',
      GDI:'GOBIERNO DIGITAL',
      GDO:'GESTIÓN DOCUMENTAL',
      GTH:'GESTIÓN ESTRATÉGICA DEL TALENTO HUMANO',
      INT:'INTEGRIDAD',
      PCI:'PARTICIPACIÓN CIUDADANA',
      PER:'GENERAL',
      PLA:'PLANEACIÓN INSTITUCIONAL',
      SDI:'SEGURIDAD DIGITAL',
      SEC:'SERVICIO AL CIUDADANO',
      SYE:'SEGUIMIENTO Y EVALUACIÓN',
      THI:'INF - GESTIÓN ESTRATÉGICA DEL TALENTO HUMANO',
      TRA:'TRANSPARENCIA, ACCESO A LA INFORMACIÓN',
    };

    const MODULE_RESPONSABLES = {
      PER: ['Liliana Hinestroza Sinisterra'],
      PLA: ['Liliana Hinestroza Sinisterra'],
      GTH: ['Ingrid Yalile Bolívar Jimenez'],
      INT: ['Ingrid Yalile Bolívar Jimenez'],
      FOR: ['Liliana Hinestroza Sinisterra', 'Ingrid Yalile Bolívar Jimenez'],
      GDI: ['Oscar Hernán Rivera Calderon', 'Freddy Alexander Guerrero Vega'],
      SDI: ['Oscar Hernán Rivera Calderon', 'Freddy Alexander Guerrero Vega'],
      DJU: ['David Orlando Mina Velasquez'],
      SEC: ['Claudia Cecilia Herrera Galvez'],
      PCI: ['Claudia Cecilia Herrera Galvez'],
      SYE: ['Liliana Hinestroza Sinisterra'],
      TRA: ['Oscar Hernán Rivera Calderon', 'Claudia Cecilia Herrera Galvez', 'Liliana Hinestroza Sinisterra'],
      GDO: ['Luis Enrique Garzón Taquez'],
      GCI: ['Ingrid Yalile Bolívar Jimenez', 'Oscar Hernán Rivera Calderon', 'Claudia Lorena Murillo Velez', 'Holmer Jose Reyes Sotelo'],
      CIN: ['Oscar Hernán Rivera Calderon', 'Carlos Horacio Libreros Salamanca', 'Liliana Hinestroza Sinisterra'],
      THI: ['Ingrid Yalile Bolívar Jimenez'],
      EMI: ['Todos - Comité Institucional de Gestión'],
      FIN: ['Todos - Comité Institucional de Gestión'],
      CCP: ['Luis Enrique Garzón Taquez'],
    };

    async function boot() {
      try {
        const index = await fetchJSON(`${CONFIG.DATA_DIR}/index.json`);
        renderGrid(index);
        show('s-main');
      } catch(e) {
        document.getElementById('err-detail').textContent = e.message;
        show('s-error');
      }
    }

    function show(id) {
      ['s-loading','s-main','s-error'].forEach(s =>
        document.getElementById(s).style.display = s === id ? (id==='s-main'?'block':'flex') : 'none'
      );
    }

    function renderGrid(index) {
      const saved = getSaved();
      const grid  = document.getElementById('mod-grid');
      grid.innerHTML = index.map(({modulo, total}, i) => {
        const resp     = saved[modulo] || {};
        // Count answered: respuesta field or direct value
        const answered = Object.values(resp).filter(v => {
          const r = v?.respuesta ?? v;
          return r !== null && r !== undefined && r !== '' && !(Array.isArray(r) && !r.length);
        }).length;
        const pct = total ? Math.round(answered / total * 100) : 0;
        const cls = pct === 100 ? 'done' : pct > 0 ? 'partial' : '';

        const progHTML = pct > 0
          ? `<span class="mod-prog ${pct < 100 ? 'partial' : ''}">${pct}%</span>` : '';

        const resps = MODULE_RESPONSABLES[modulo] || [];
        const respHTML = resps.length
          ? `<div class="mod-responsables">` +
              resps.map(r => `<span class="mod-resp-tag">${r}</span>`).join('') +
            `</div>`
          : '';

        return (
          `<div class="mod-card ${cls}" onclick="goModule('${modulo}',${i+1})" role="button" tabindex="0"` +
               ` onkeydown="if(event.key==='Enter')goModule('${modulo}',${i+1})">` +
            `<div class="mod-card-top">` +
              `<div class="mod-seq">${i+1}</div>` +
              `<div class="mod-code">${modulo}</div>` +
            `</div>` +
            `<div class="mod-name">${MODULE_NAMES[modulo]||modulo}</div>` +
            respHTML +
            `<div class="mod-footer">` +
              `<span class="mod-count">${total} preguntas</span>` +
              progHTML +
            `</div>` +
          `</div>`
        );
      }).join('');
    }

    function goModule(mod) {
      const nombre = document.getElementById('inp-nombre').value.trim();
      if (!nombre) {
        toast('Ingresa tu nombre antes de continuar', 'warn');
        document.getElementById('inp-nombre').focus();
        return;
      }
      sessionStorage.setItem('furag_nombre',  nombre);
      sessionStorage.setItem('furag_entidad', document.getElementById('inp-entidad').value.trim());
      window.location.href = `modulo.html?mod=${mod}`;
    }

    window.addEventListener('DOMContentLoaded', () => {
      const n = sessionStorage.getItem('furag_nombre');
      const e = sessionStorage.getItem('furag_entidad');
      if (n) document.getElementById('inp-nombre').value  = n;
      if (e) document.getElementById('inp-entidad').value = e;
      boot();
    });
  </script>
</body>
</html>
