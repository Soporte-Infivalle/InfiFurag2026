<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURAG 2025 — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
  <script src="config.js"></script>
</head>
<body>

  <header class="app-header">
    <a href="index.html" class="header-logo">FURAG <em>2025</em></a>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="header-badge">Formulario de Respuestas</span>
      <a href="admin.html" class="header-admin-btn" title="Panel Admin">⚙</a>
    </div>
  </header>

  <div id="s-loading" class="center-screen">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:.9rem">Cargando módulos…</p>
  </div>

  <div id="s-main" class="page" style="display:none">
    <h1 class="page-title">Selecciona tu módulo</h1>
    <p class="page-sub">
      Elige el módulo que te corresponde. Las preguntas se muestran en el orden oficial del formulario FURAG.
    </p>

    <div class="id-row">
      <div>
        <label class="field-label" for="inp-nombre">Tu nombre completo</label>
        <input id="inp-nombre" class="input-field" type="text"
               placeholder="Ej: María García" autocomplete="name">
      </div>
      <div>
        <label class="field-label" for="inp-entidad">Area / Proceso</label>
        <input id="inp-entidad" class="input-field" type="text"
               placeholder="Ej: Planeación" autocomplete="organization">
      </div>
    </div>

    <div class="section-label-row">
      <span class="section-label">Módulos — en orden FURAG</span>
      <span class="sync-status" id="sync-status"></span>
    </div>
    <div class="mod-grid" id="mod-grid"></div>
  </div>

  <div id="s-error" style="display:none" class="center-screen">
    <div class="err-icon">⚠️</div>
    <div class="err-title">No se pudo cargar</div>
    <p class="err-msg">Verifica que <code>data/index.json</code> existe en el repositorio.</p>
    <div class="err-code" id="err-detail"></div>
    <button class="btn btn-outline" onclick="location.reload()">Reintentar</button>
  </div>

  <div class="toast" id="toast" role="alert"></div>

  <script src="js/shared.js"></script>
  <script>
    const MODULE_NAMES = {
      CCP:'COMPRAS Y CONTRATACIÓN',       CIN:'CONTROL INTERNO',
      DJU:'DEFENSA JURÍDICA',             EMI:'TEMAS TRANSVERSALES',
      FIN:'FINALES',                       FOR:'FORTALECIMIENTO INSTITUCIONAL',
      GCI:'GESTIÓN DEL CONOCIMIENTO Y LA INNOVACIÓN',
      GDI:'GOBIERNO DIGITAL',             GDO:'GESTIÓN DOCUMENTAL',
      GTH:'GESTIÓN ESTRATÉGICA DEL TALENTO HUMANO',
      INT:'INTEGRIDAD',                    PCI:'PARTICIPACIÓN CIUDADANA',
      PER:'GENERAL',                       PLA:'PLANEACIÓN INSTITUCIONAL',
      SDI:'SEGURIDAD DIGITAL',            SEC:'SERVICIO AL CIUDADANO',
      SYE:'SEGUIMIENTO Y EVALUACIÓN',
      THI:'INF - GESTIÓN ESTRATÉGICA DEL TALENTO HUMANO',
      TRA:'TRANSPARENCIA, ACCESO A LA INFORMACIÓN',
    };

    const MODULE_RESPONSABLES = {
      PER: ['Liliana Hinestroza Sinisterra'],
      PLA: ['Liliana Hinestroza Sinisterra'],
      GTH: ['Ingrid Yalile Bolívar Jimenez'],
      INT: ['Ingrid Yalile Bolívar Jimenez'],
      FOR: ['Liliana Hinestroza Sinisterra', 'Ingrid Yalile Bolívar Jimenez'],
      GDI: ['Oscar Hernán Rivera Calderon', 'Freddy Alexander Guerrero Vega'],
      SDI: ['Oscar Hernán Rivera Calderon', 'Freddy Alexander Guerrero Vega'],
      DJU: ['David Orlando Mina Velasquez'],
      SEC: ['Claudia Cecilia Herrera Galvez'],
      PCI: ['Claudia Cecilia Herrera Galvez'],
      SYE: ['Liliana Hinestroza Sinisterra'],
      TRA: ['Oscar Hernán Rivera Calderon', 'Claudia Cecilia Herrera Galvez', 'Liliana Hinestroza Sinisterra'],
      GDO: ['Luis Enrique Garzón Taquez'],
      GCI: ['Ingrid Yalile Bolívar Jimenez', 'Oscar Hernán Rivera Calderon', 'Claudia Lorena Murillo Velez', 'Holmer Jose Reyes Sotelo'],
      CIN: ['Oscar Hernán Rivera Calderon', 'Carlos Horacio Libreros Salamanca', 'Liliana Hinestroza Sinisterra', 'Claudia Cecilia Herrera Galvez','Ingrid Yalile Bolívar Jimenez', 'Holmer Jose Reyes Sotelo'],
      THI: ['Ingrid Yalile Bolívar Jimenez'],
      EMI: ['Todos - Comité Institucional de Gestión'],
      FIN: ['Todos - Comité Institucional de Gestión'],
      CCP: ['Luis Enrique Garzón Taquez'],
    };

    // Estado global
    let moduleIndex   = [];   // [{modulo, total}] — orden FURAG
    let remoteProgress = {};  // { MOD: {respondidas, total, pct, personas} }

    // ── Boot ─────────────────────────────────────────
    async function boot() {
      try {
        moduleIndex = await fetchJSON(`${CONFIG.DATA_DIR}/index.json`);
        renderGrid();
        show('s-main');
        // Cargar progreso remoto si hay webhook configurado
        await refreshProgress();
      } catch(e) {
        document.getElementById('err-detail').textContent = e.message;
        show('s-error');
      }
    }

    // ── Consulta el progreso al Apps Script (doGet) ───
    async function refreshProgress() {
      if (!CONFIG.WEBHOOK_URL) return;
      try {
        setSyncStatus('syncing');
        // doGet usa la misma URL base — reemplazar /exec al final no es necesario,
        // el mismo deployment responde GET y POST
        const res  = await fetch(CONFIG.WEBHOOK_URL, { method: 'GET', mode: 'cors' });
        const json = await res.json();
        if (json.status === 'ok' && json.progreso) {
          remoteProgress = json.progreso;
          updateProgressBadges();
          setSyncStatus('ok');
        }
      } catch(e) {
        // Sin acceso al sheet — no bloquear la UI, solo mostrar advertencia
        setSyncStatus('offline');
      }
    }

    // ── Actualiza solo los badges de progreso sin re-renderizar todo ─────────
    function updateProgressBadges() {
      moduleIndex.forEach(({ modulo, total }) => {
        const card = document.getElementById('mc-' + modulo);
        if (!card) return;

        const remote = remoteProgress[modulo];
        if (!remote) return;

        const pct  = remote.pct || 0;
        const resp = remote.respondidas || 0;

        // Actualizar barra y clase
        card.className = 'mod-card' + (pct === 100 ? ' done' : pct > 0 ? ' partial' : '');

        // Badge de progreso remoto
        const badge = card.querySelector('.mod-prog-remote');
        if (badge) {
          badge.textContent  = pct > 0 ? pct + '%' : '';
          badge.className    = 'mod-prog-remote' + (pct === 100 ? '' : pct > 0 ? ' partial' : ' hidden');
        }

        // Barra de progreso interna
        const bar = card.querySelector('.mod-bar-fill');
        if (bar) bar.style.width = pct + '%';

        // Personas que han respondido
        const personas = card.querySelector('.mod-personas');
        if (personas && remote.personas) {
          personas.textContent = remote.personas
            ? remote.personas.split(',').map(p => p.trim().split(' ')[0]).filter(Boolean).join(', ')
            : '';
          personas.style.display = remote.personas ? 'block' : 'none';
        }
      });
    }

    // ── Renderiza la grilla completa ──────────────────
    function renderGrid() {
      const grid = document.getElementById('mod-grid');
      grid.innerHTML = moduleIndex.map(({ modulo, total }, i) => {
        const resps   = MODULE_RESPONSABLES[modulo] || [];
        const respHTML = resps.length
          ? '<div class="mod-responsables">' +
              resps.map(r => '<span class="mod-resp-tag">' + r + '</span>').join('') +
            '</div>'
          : '';

        return (
          '<div class="mod-card" id="mc-' + modulo + '"' +
               ' onclick="goModule(\'' + modulo + '\')" role="button" tabindex="0"' +
               ' onkeydown="if(event.key===\'Enter\')goModule(\'' + modulo + '\')">' +
            '<div class="mod-card-top">' +
              '<div class="mod-seq">' + (i + 1) + '</div>' +
              '<div class="mod-code">' + modulo + '</div>' +
              '<span class="mod-prog-remote hidden"></span>' +
            '</div>' +
            '<div class="mod-name">' + (MODULE_NAMES[modulo] || modulo) + '</div>' +
            respHTML +
            '<div class="mod-bar-track"><div class="mod-bar-fill" style="width:0%"></div></div>' +
            '<div class="mod-footer">' +
              '<span class="mod-count">' + total + ' preguntas</span>' +
              '<span class="mod-personas" style="display:none"></span>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    // ── Navegar al módulo ─────────────────────────────
    function goModule(mod) {
      const nombre = document.getElementById('inp-nombre').value.trim();
      if (!nombre) {
        toast('Ingresa tu nombre antes de continuar', 'warn');
        document.getElementById('inp-nombre').focus();
        return;
      }
      sessionStorage.setItem('furag_nombre',  nombre);
      sessionStorage.setItem('furag_entidad', document.getElementById('inp-entidad').value.trim());
      window.location.href = 'modulo.html?mod=' + mod;
    }

    // ── Indicador de sincronización ───────────────────
    function setSyncStatus(state) {
      const el = document.getElementById('sync-status');
      if (!el) return;
      const map = {
        syncing: { text: '↻ Actualizando…', cls: 'syncing' },
        ok:      { text: '✓ Progreso actualizado',  cls: 'ok'      },
        offline: { text: '○ Sin conexión al Sheet', cls: 'offline' },
      };
      const s = map[state] || map.offline;
      el.textContent = s.text;
      el.className   = 'sync-status ' + s.cls;
    }

    function show(id) {
      ['s-loading','s-main','s-error'].forEach(s =>
        document.getElementById(s).style.display = s === id ? (id === 's-main' ? 'block' : 'flex') : 'none'
      );
    }

    window.addEventListener('DOMContentLoaded', () => {
      const n = sessionStorage.getItem('furag_nombre');
      const e = sessionStorage.getItem('furag_entidad');
      if (n) document.getElementById('inp-nombre').value = n;
      if (e) document.getElementById('inp-entidad').value = e;

      // Si vuelve tras un submit, refrescar el progreso automáticamente
      const submitted = sessionStorage.getItem('furag_just_submitted');
      if (submitted) {
        sessionStorage.removeItem('furag_just_submitted');
      }
      boot();
    });

    // Exponer para que modulo.html lo llame antes de redirigir
    window.markSubmitted = () => sessionStorage.setItem('furag_just_submitted', '1');
  </script>
</body>
</html>
