<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURAG 2025 — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/index.css">
  <script src="config.js"></script>
</head>
<body>

  <header class="app-header">
    <a href="index.html" class="header-logo">FURAG <em>2025</em></a>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="header-badge">Formulario de Respuestas</span>
      <a href="admin.html" class="header-admin-btn" title="Panel Admin">⚙</a>
    </div>
  </header>

  <!-- Loading -->
  <div id="s-loading" class="center-screen">
    <div class="spinner"></div>
    <p style="color:var(--muted);font-size:.9rem">Cargando módulos…</p>
  </div>

  <!-- Main -->
  <div id="s-main" class="page" style="display:none">
    <h1 class="page-title">Selecciona tu módulo</h1>
    <p class="page-sub">
      Elige el módulo que te corresponde. Las preguntas se muestran en el orden oficial del formulario FURAG.
    </p>

    <div class="id-row">
      <div>
        <label class="field-label" for="inp-nombre">Tu nombre completo</label>
        <input id="inp-nombre" class="input-field" type="text"
               placeholder="Ej: María García" autocomplete="name">
      </div>
      <div>
        <label class="field-label" for="inp-entidad">Entidad / Dependencia</label>
        <input id="inp-entidad" class="input-field" type="text"
               placeholder="Ej: Ministerio de Salud" autocomplete="organization">
      </div>
    </div>

    <div class="section-label">Módulos — en orden FURAG</div>
    <div class="mod-grid" id="mod-grid"></div>
  </div>

  <!-- Error -->
  <div id="s-error" style="display:none" class="center-screen">
    <div class="err-icon">⚠️</div>
    <div class="err-title">No se pudo cargar</div>
    <p class="err-msg">Verifica que <code>data/index.json</code> existe en el repositorio.</p>
    <div class="err-code" id="err-detail"></div>
    <button class="btn btn-outline" onclick="location.reload()">Reintentar</button>
  </div>

  <div class="toast" id="toast" role="alert"></div>

  <script src="js/shared.js"></script>
  <script>
    const MODULE_NAMES = {
      CCP:'Control de Corrupción y Protección', CIN:'Control Interno',
      DJU:'Defensa Jurídica', EMI:'Emisiones y Medio Ambiente',
      FIN:'Financiero', FOR:'Fortalecimiento Organizacional',
      GCI:'Gestión Ciudadana', GDI:'Gestión de la Información',
      GDO:'Gestión Documental', GTH:'Gestión del Talento Humano',
      INT:'Integridad', PCI:'Participación Ciudadana',
      PER:'Percepción', PLA:'Planeación', SDI:'Seguridad Digital',
      SEC:'Servicio al Ciudadano', SYE:'Seguimiento y Evaluación',
      THI:'Tecnologías de la Información', TRA:'Transparencia',
    };

    async function boot() {
      try {
        const index = await fetchJSON(`${CONFIG.DATA_DIR}/index.json`);
        renderGrid(index);
        show('s-main');
      } catch(e) {
        document.getElementById('err-detail').textContent = e.message;
        show('s-error');
      }
    }

    function show(id) {
      ['s-loading','s-main','s-error'].forEach(s =>
        document.getElementById(s).style.display = s === id ? (id==='s-main'?'block':'flex') : 'none'
      );
    }

    function renderGrid(index) {
      const saved = getSaved();
      const grid  = document.getElementById('mod-grid');
      grid.innerHTML = index.map(({modulo, total}, i) => {
        const resp    = saved[modulo] || {};
        const answered= Object.values(resp).filter(v => v !== '' && !(Array.isArray(v) && !v.length)).length;
        const pct     = total ? Math.round(answered / total * 100) : 0;
        const cls     = pct === 100 ? 'done' : pct > 0 ? 'partial' : '';
        const progHTML= pct > 0
          ? `<span class="mod-prog ${pct<100?'partial':''}">${pct}%</span>` : '';
        return `
          <div class="mod-card ${cls}" onclick="goModule('${modulo}', ${i+1})" role="button" tabindex="0"
               onkeydown="if(event.key==='Enter')goModule('${modulo}',${i+1})">
            <div class="mod-seq">${i+1}</div>
            <div class="mod-code">${modulo}</div>
            <div class="mod-name">${MODULE_NAMES[modulo]||modulo}</div>
            <div class="mod-footer">
              <span class="mod-count">${total} preguntas</span>
              ${progHTML}
            </div>
          </div>`;
      }).join('');
    }

    function goModule(mod, seq) {
      const nombre = document.getElementById('inp-nombre').value.trim();
      if (!nombre) {
        toast('Ingresa tu nombre antes de continuar', 'warn');
        document.getElementById('inp-nombre').focus();
        return;
      }
      // Save identity to sessionStorage so modulo.html can read it
      sessionStorage.setItem('furag_nombre',  nombre);
      sessionStorage.setItem('furag_entidad', document.getElementById('inp-entidad').value.trim());
      window.location.href = `modulo.html?mod=${mod}`;
    }

    // Restore identity if returning from a module
    window.addEventListener('DOMContentLoaded', () => {
      const n = sessionStorage.getItem('furag_nombre');
      const e = sessionStorage.getItem('furag_entidad');
      if (n) document.getElementById('inp-nombre').value  = n;
      if (e) document.getElementById('inp-entidad').value = e;
      boot();
    });
  </script>
</body>
</html>
